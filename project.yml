name: Moody
options:
  bundleIdPrefix: com.mariayarley
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    # TF-1: automatic signing with Maria's team (simulator builds don't need
    # certs; device archives get profiles + the App Group registered via
    # `-allowProvisioningUpdates`). Was CODE_SIGNING_REQUIRED=NO (sim-only).
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: RC99K6SXQX
    GENERATE_INFOPLIST_FILE: "YES"
    MARKETING_VERSION: "0.2.0"
    # Build number is stamped by scripts/testflight.sh (git commit count) —
    # this default only covers ad-hoc Xcode builds.
    CURRENT_PROJECT_VERSION: "1"
targets:
  # The domain engine from the parallel build (SwiftData models, GF safety,
  # shopping pipeline, calendar sync) — its own module so type names never
  # collide with the presentation structs the screens bind to.
  MoodyEngine:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mariayarley.Moody.Engine
        # Engine API is internal; the app uses `@testable import MoodyEngine`
        # until the public-API pass lands (BACKLOG P5-1). Debug-stage tradeoff.
        ENABLE_TESTABILITY: "YES"
    sources:
      - path: MoodyMeals
        excludes:
          - "MoodyMealsApp.swift"   # their @main — retired
          - "ContentView.swift"     # their tab shell — retired
          - "Views/**"              # NEEDS-VISUAL-REVIEW placeholders — retired
  MoodyEngineTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MoodyMealsTests
    dependencies:
      - target: MoodyEngine
  Moody:
    type: application
    platform: iOS
    settings:
      base:
        # Must live at TARGET level: XcodeGen's per-target default ("1,2")
        # shadows the project-level setting, and an iPad-capable portrait-only
        # bundle fails App Store validation (error 90474, hit 2026-07-12).
        # iPhone-only apps still run scaled on iPad, so nobody loses install.
        TARGETED_DEVICE_FAMILY: "1"
    sources:
      - path: Moody
      # Shared Live Activity attributes + UI (CookModeController starts the
      # activity from the app; ActivityKit matches on CookModeAttributes).
      - path: MoodyWidgets/CookModeActivity.swift
    dependencies:
      - target: MoodyWidgets
        embed: true
      - target: MoodyEngine
        embed: true
    # App Group shared with MoodyWidgets — the snapshot.json contract
    # (Moody/Data/Persistence.swift). XcodeGen generates the file; app groups
    # work on simulator without signing, so CODE_SIGNING settings stay as-is.
    entitlements:
      path: Moody.entitlements
      properties:
        com.apple.security.application-groups: [group.com.mariayarley.Moody]
    info:
      path: Moody/Info.plist
      properties:
        CFBundleDisplayName: Moody
        # TestFlight export compliance: no non-exempt encryption (HTTPS only),
        # answered here once so every upload skips the compliance interview.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSSupportsLiveActivities: true
        CFBundleURLTypes:
          - CFBundleURLName: com.mariayarley.Moody
            CFBundleURLSchemes:
              - moody
        UIAppFonts:
          - Baloo2-SemiBold.ttf
          - Baloo2-Bold.ttf
          - Baloo2-ExtraBold.ttf
          - Nunito-Bold.ttf
          - Nunito-ExtraBold.ttf
          - Nunito-Black.ttf
          - Quicksand-SemiBold.ttf
  MoodyWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        # Extension bundle id must be prefixed by the app's bundle id.
        PRODUCT_BUNDLE_IDENTIFIER: com.mariayarley.Moody.MoodyWidgets
        # Same target-level pin as the app (XcodeGen defaults to "1,2").
        TARGETED_DEVICE_FAMILY: "1"
    sources:
      - path: MoodyWidgets
      - path: Moody/DesignSystem/Theme.swift
      - path: Moody/DesignSystem/Components.swift
      - path: Moody/Models/Models.swift
      # Widgets read the same App Group snapshot the app writes.
      - path: Moody/Data/Persistence.swift
      - path: Moody/Resources/Fonts
        buildPhase: resources
    entitlements:
      path: MoodyWidgets.entitlements
      properties:
        com.apple.security.application-groups: [group.com.mariayarley.Moody]
    info:
      path: MoodyWidgets/Info.plist
      properties:
        CFBundleDisplayName: Moody
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSSupportsLiveActivities: true
        UIAppFonts:
          - Baloo2-SemiBold.ttf
          - Baloo2-Bold.ttf
          - Baloo2-ExtraBold.ttf
          - Nunito-Bold.ttf
          - Nunito-ExtraBold.ttf
          - Nunito-Black.ttf
          - Quicksand-SemiBold.ttf
schemes:
  MoodyEngine:
    build:
      targets:
        MoodyEngine: all
        MoodyEngineTests: [test]
    test:
      targets:
        - MoodyEngineTests
